name: Build Chrome Plus Lite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure and Compile
        run: |
          xmake config -a ${{ matrix.arch }} -m release -y
          xmake -y

      - name: Prepare Release Directory
        run: |
          mkdir release_stage
          cp build/release/version.dll release_stage/
          cp chrome++.ini release_stage/
        shell: bash

      - name: Package as Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome_plus_lite-${{ matrix.arch }}
          path: release_stage/*
